<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top, #0b1b3a, #050816 70%);
  color:white;
}

/* ===== START SCREEN ===== */
#startScreen{
  position:absolute;
  width:100%;
  height:100%;
  background:#050816;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
  cursor:pointer;
}

#startScreen h1{
  font-size:22px;
  letter-spacing:2px;
  opacity:0.8;
}

/* ===== STARS ===== */
.stars{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:0;
}

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation: twinkle 3s infinite alternate, drift 10s linear infinite;
}

@keyframes twinkle{
  from{opacity:0.2; transform:scale(0.8);}
  to{opacity:1; transform:scale(1.3);}
}

@keyframes drift{
  0%{transform:translateY(0);}
  100%{transform:translateY(-20px);}
}

/* SHOOTING STARS */
.shooting-star{
  position:absolute;
  width:170px;
  height:2px;
  background:linear-gradient(90deg, white, transparent);
  opacity:0;
  transform:rotate(25deg);
  animation: shoot 7s linear infinite;
}

@keyframes shoot{
  0%{transform:translateX(120vw) translateY(0) rotate(25deg); opacity:0;}
  5%{opacity:1;}
  100%{transform:translateX(-200px) translateY(40vh) rotate(25deg); opacity:0;}
}

/* AURORA */
.aurora{
  position:absolute;
  width:100%;
  height:100%;
  background: radial-gradient(circle at 30% 40%, rgba(0,140,255,0.25), transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(120,0,255,0.2), transparent 50%);
  filter: blur(40px);
  animation: float 8s ease-in-out infinite;
  z-index:0;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

/* SLIDES */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  opacity:0;
  transition:1.2s ease;
  z-index:2;
}

.slide.active{
  opacity:1;
}

p{
  font-size:18px;
  line-height:1.7;
  max-width:750px;
}

img{
  width:200px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
  <h1>Click to enter your world</h1>
</div>

<div class="stars
