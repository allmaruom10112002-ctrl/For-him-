<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Abdulrahman 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #001b3a, #000814);
  color: white;
  text-align: center;
  overflow: hidden;
  font-size: 18px;
}

/* stars background */
.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.4;
}

/* shooting stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: move 3s linear infinite;
  opacity: 0;
}

@keyframes move {
  0% {
    transform: translate(0,0);
    opacity: 1;
  }
  100% {
    transform: translate(300px,600px);
    opacity: 0;
  }
}

/* center content */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
}

h1 {
  font-size: 28px;
}

.text {
  margin-top: 15px;
  font-size: 20px;
  line-height: 1.8;
}

img {
  width: 200px;
  border-radius: 15px;
  margin-top: 10px;
  box-shadow: 0 0 20px #4fc3f7;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #4fc3f7;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- shooting stars -->
<div class="star" style="top:10%; left:20%;"></div>
<div class="star" style="top:30%; left:70%; animation-delay:1s;"></div>
<div class="star" style="top:60%; left:40%; animation-delay:2s;"></div>

<div class="container">

<h1>Happy Birthday Abdulrahman 🎉</h1>

<img src="photo.jpg">

<div class="text" id="textBox">
Hey… I don’t know if you’ll ever know who this is, but I hope you feel this.
</div>

<button onclick="nextText()">Next ➜</button>

</div>

<script>
const messages = [
`Hey… I don’t know if you’ll ever know who this is, but I hope you feel this.`,

`I just wanted to say that you’ve always been someone really special to me.
You changed something in my life without even trying… you made life feel a little lighter.`,

`There’s something about you that’s just… rare.
Your laugh, the way you talk, your kindness… even the smallest things about you stay in my mind.`,

`No matter what happens, you’ll always be someone important to me.
You were more than just someone in my life… you were home in a way.`,

`I really hope life is kind to you.
I hope you succeed, travel, laugh, and live beautifully.`,

`Maybe we won’t meet again…
but I’ll always remember you.
Some people just leave a mark on your life… and you’re one of them ❤️`
];

let i = 0;

function nextText(){
  document.getElementById("textBox").innerText = messages[i];
  i++;
  if(i >= messages.length){
    i = 0;
  }
}
</script>

</body>
</html>
