<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Story 💙</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: #0b1020;
  color:white;
  text-align:center;
}

/* pages */
.page{
  display:none;
  padding:60px 20px;
}

.active{
  display:block;
}

/* button */
button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  background:#4fc3f7;
  color:black;
  font-weight:bold;
}

/* image */
img{
  width:200px;
  border-radius:15px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
<h1>🎉 Happy Birthday ..</h1>
<p>Hey You Know What! You're the most adorable human i ever met!</p>
<button onclick="next(2)">Click to Enter Our World</button>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
<h1>Happy Birthday Ganty 💙</h1>
<p id="t2"></p>
<button onclick="next(3)">Enter Our Storylane</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
<h1>Our Beautiful Moments Together 🌸</h1>

<img src="photo.jpg">

<p id="t3"></p>

<button onclick="next(4)">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page" id="p4">
<h1>Thank You for the Memories 💙</h1>
<p id="t4"></p>
</div>

<script>

const text2 = [
"You're such a kind and wonderful person, and I feel lucky to share such a good bond with you.",
"Thank you for everything you've done for me.",
"Wishing you success, happiness, and everything your heart desires.",
"May God keep you safe for me, my love."
];

const text3 = [
"Her Smile Says It All 💙",
"You're truly one of the sweetest girls I know.",
"I feel lucky to have a sis like you."
];

const text4 = [
"Everything is beautiful with you, and everything passes smoothly when we're together.",
"May you always remain my sister, my support, and my strength my love.",
"Until We Meet Again 💙"
];

let i2=0, i3=0, i4=0;

function next(page){

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+page).classList.add('active');

  if(page==2){
    type2();
  }
  if(page==3){
    type3();
  }
  if(page==4){
    type4();
  }
}

/* typing effect */
function type2(){
  if(i2 < text2.length){
    document.getElementById("t2").innerHTML += text2[i2] + "<br><br>";
    i2++;
    setTimeout(type2, 800);
  }
}

function type3(){
  if(i3 < text3.length){
    document.getElementById("t3").innerHTML += text3[i3] + "<br><br>";
    i3++;
    setTimeout(type3, 800);
  }
}

function type4(){
  if(i4 < text4.length){
    document.getElementById("t4").innerHTML += text4[i4] + "<br><br>";
    i4++;
    setTimeout(type4, 800);
  }
}

</script>

</body>
</html>
