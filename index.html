<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Abdulrahman 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #001b3a, #000814);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* stars */
.stars, .stars2, .stars3 {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  animation: moveStars 50s linear infinite;
}

.stars {
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.4;
}

@keyframes moveStars {
  from {transform: translateY(0);}
  to {transform: translateY(-1000px);}
}

/* shooting star */
.shooting-star {
  position: absolute;
  width: 2px;
  height: 80px;
  background: white;
  transform: rotate(45deg);
  animation: shoot 3s linear infinite;
  opacity: 0.7;
}

@keyframes shoot {
  0% {transform: translateX(0) translateY(0) rotate(45deg); opacity: 1;}
  100% {transform: translateX(400px) translateY(400px) rotate(45deg); opacity: 0;}
}

.container {
  position: relative;
  z-index: 2;
  top: 50%;
  transform: translateY(30%);
  padding: 20px;
}

img {
  width: 200px;
  border-radius: 15px;
  margin-top: 10px;
  box-shadow: 0 0 20px #4fc3f7;
}

.text {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.6;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #4fc3f7;
  color: black;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- shooting stars -->
<div class="shooting-star" style="top:10%; left:20%;"></div>
<div class="shooting-star" style="top:30%; left:70%; animation-delay:1s;"></div>
<div class="shooting-star" style="top:60%; left:40%; animation-delay:2s;"></div>

<div class="container">

<h1>Happy Birthday Abdulrahman 🎉</h1>

<img src="photo.jpg" alt="Abdulrahman">

<div class="text" id="textBox">
Click to start ✨
</div>

<button onclick="nextText()">Next ➜</button>

</div>

<script>
const messages = [
`Hey… I don’t know if you’ll ever know who this is, but I hope you feel this.`,

`I just wanted to say that you’ve always been someone really special to me.
You changed something in my life without even trying… you made life feel a little lighter, a little better.`,

`There’s something about you that’s just… rare.
Your laugh, the way you talk, your kindness… even the smallest things about you stay in my mind.`,

`No matter what happens, you’ll always be someone important to me.
You were more than just someone in my life… you were home in a way.`,

`I really hope life is kind to you…
I hope you succeed, travel the world, laugh a lot, and live beautifully.`,

`Maybe we won’t meet again…
but I’ll always remember you.
Some people just leave a mark on your life… and you’re one of them ❤️`
];

let i = 0;

function nextText(){
  document.getElementById("textBox").innerText = messages[i];
  i++;
  if(i >= messages.length){
    i = 0;
  }
}
</script>

</body>
</html>
